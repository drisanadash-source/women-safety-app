
<!DOCTYPE html>
<html>
<head>
    <title>Women Safety Quick Help</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    Women Safety Quick Help 🚨
</header>

<div class="container">

    <button class="sos-btn" onclick="sendSOS()">SOS EMERGENCY</button>

    <div class="card">
        <h3>Emergency Contacts</h3>
        <p>Police: 100</p>
        <p>Women Helpline: 181</p>
        <button onclick="callPolice()">Call Police</button>
    </div>

    <div class="card">
        <h3>Nearby Police Station</h3>
        <iframe 
            src="https://www.google.com/maps?q=police+station+near+me&output=embed">
        </iframe>
    </div>

    <div class="card">
        <h3>Safety Tips</h3>
        <ul>
            <li>Share your live location.</li>
            <li>Avoid isolated areas at night.</li>
            <li>Keep emergency numbers ready.</li>
            <li>Trust your instincts.</li>
        </ul>
    </div>

</div>

<script src="first.js"></script>
</body>
</html>
